# ============================================================
# Sweeask — GitHub Pages Auto-Deploy
# Triggers on every push to main branch
# Deploys the entire repo root to GitHub Pages
# ============================================================

name: Deploy Sweeask to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

# Allow this workflow to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── BUILD JOB ──
  build:
    name: Build & Prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          echo "Checking required files..."
          required_files=("index.html" "app.html" "about.html" "support.html" "updates.html" "style.css" "manifest.json" "sw.js" "components.js" "favicon.png")
          missing=0
          for f in "${required_files[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✅ $f ($(wc -c < "$f") bytes)"
            else
              echo "  ❌ MISSING: $f"
              missing=$((missing + 1))
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "Error: $missing required file(s) missing"
            exit 1
          fi
          echo ""
          echo "All required files present!"

      - name: List all deployable files
        run: |
          echo "Files being deployed:"
          find . -not -path './.git/*' -not -path './.github/*' -not -name '.*' -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repo root
          path: '.'

  # ── DEPLOY JOB ──
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print deployment URL
        run: |
          echo ""
          echo "🚀 Sweeask deployed successfully!"
          echo "🌐 Live at: ${{ steps.deployment.outputs.page_url }}"
          echo "📱 App:     ${{ steps.deployment.outputs.page_url }}app.html"
          echo ""
